<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Profile - Beyond Four Walls</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styling.css" />
</head>
<body>
  <header>
    <nav>
      <a href="home.html" class="brand">Beyond Four Walls</a>
      <div class="nav-links">
        <a href="home.html">Home</a>
        <a href="about.html">About</a>
        <a href="chat.html">Chat</a>
        <a href="profile.html" class="active">Profile</a>
        <a href="login.html">Login</a>
        <a href="signup.html" class="btn-nav">Sign Up</a>
      </div>
    </nav>
  </header>

  <main class="profile-container">
    <section class="profile-card">
      <h1>Your Profile</h1>
      
      <form id="profileForm">
        <div class="form-row">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Alex Tan" required />
          </div>
          <div class="form-group form-group-short">
            <label for="age">Age</label>
            <input type="number" id="age" name="age" placeholder="22" required min="0" max="120" />
          </div>
        </div>

        <div class="form-group">
          <label for="school">School / Course</label>
          <input type="text" id="school" name="school" placeholder="Ngee Ann Polytechnic, Digital Media" required />
        </div>

        <div class="form-group">
          <label for="bio">Bio</label>
          <textarea id="bio" name="bio" rows="4" placeholder="A little about you..."></textarea>
        </div>

        <div class="interests-section">
          <h3>Interests</h3>
          <div class="interests-grid">
            <label class="interest-checkbox">
              <input type="checkbox" name="interests" value="Gaming" />
              <span class="custom-box"></span>
              Gaming
            </label>
            <label class="interest-checkbox">
              <input type="checkbox" name="interests" value="Anime" />
              <span class="custom-box"></span>
              Anime
            </label>
            <label class="interest-checkbox">
              <input type="checkbox" name="interests" value="Music" />
              <span class="custom-box"></span>
              Music
            </label>
            <label class="interest-checkbox">
              <input type="checkbox" name="interests" value="Art" />
              <span class="custom-box"></span>
              Art
            </label>
            <label class="interest-checkbox">
              <input type="checkbox" name="interests" value="Café hopping" />
              <span class="custom-box"></span>
              Café hopping
            </label>
            <label class="interest-checkbox">
              <input type="checkbox" name="interests" value="Sports" />
              <span class="custom-box"></span>
              Sports
            </label>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-save">Save Profile</button>
        </div>
      </form>
    </section>
  </main>

  <footer>
    &copy; 2026 Beyond Four Walls. Built for C240.
  </footer>

  <script>
    // Handle Profile Form submission and forward data to n8n
    document.getElementById('profileForm').addEventListener('submit', function(e) {
      e.preventDefault();

      // Gather checked interests into an array
      const selectedInterests = [];
      document.querySelectorAll('input[name="interests"]:checked').forEach((checkbox) => {
        selectedInterests.push(checkbox.value);
      });

      // Construct payload data object
      const formData = {
        name: document.getElementById('name').value,
        age: parseInt(document.getElementById('age').value, 10),
        school: document.getElementById('school').value,
        bio: document.getElementById('bio').value,
        interests: selectedInterests,
        timestamp: new Date().toISOString()
      };

      console.log('Sending data to n8n webhook:', formData);

      // REPLACE WITH YOUR ACTUAL N8N WEBHOOK URL
      const n8nWebhookUrl = 'https://primary-production-xxxx.up.railway.app/webhook/xxxx-xxxx';

      fetch(n8nWebhookUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(formData)
      })
      .then(response => {
        if (response.ok) {
          alert('Profile saved successfully and sent to n8n!');
        } else {
          alert('Failed to save profile on the backend server.');
        }
      })
      .catch(err => {
        console.error('Error hitting n8n Webhook:', err);
        alert('Error connecting to matching service webhook.');
      });
    });
  </script>
</body>
</html>
