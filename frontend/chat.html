<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C240 - Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styling.css" />
</head>

<body>
  <header>
    <nav>
      <a href="home.html" class="brand">Beyond Four Walls</a>
      <div class="nav-links">
        <a href="home.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="chat.html" class="active">Chat</a>
        <a href="find-friends.html">Find Friends</a>
        <div class="profile-dropdown" id="profileDropdown">
          <button class="avatar-btn" id="avatarBtn" aria-label="Toggle user menu" aria-haspopup="true"
            aria-expanded="false">
            <span class="user-icon"></span>
          </button>

          <div class="dropdown-menu" id="dropdownMenu">
            <a href="profile-display.html" id="updateProfileOpt"><span class="icon">👤</span> Update Profile</a>
            <a href="#" id="logoutOpt" class="logout-link"><span class="icon">🚪</span> Logout</a>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <main class="chat-page">
    <div class="chat-glow" aria-hidden="true"></div>

    <!-- Hero: now covers both Lumi and friend-finding -->
    <section class="chat-hero">
      <p class="eyebrow">Your space to connect</p>
      <h1>Hi, I'm Lumi.</h1>
      <p class="subtext">
        Talk to me anytime, or let me introduce you to people who get you —
        at your pace, no pressure.
      </p>
    </section>

  <div id="chatbot" class="chat-panel" aria-label="Lumi chatbot">
    <iframe
      src="https://cdn.botpress.cloud/webchat/v3.6/shareable.html?configUrl=https://files.bpcontent.cloud/2026/05/12/04/20260512040002-DAORQ82T.json"
      width="100%" height="100%" frameborder="0" allow="clipboard-write; microphone" style="border:0;border-radius:12px;">
    </iframe>
  </div>
  
  </main>


  <!-- Botpress Webchat -->
  <!-- <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
  <script src="https://files.bpcontent.cloud/2026/05/12/04/20260512040002-3M3JEC0F.js" defer></script>-->
    

  <div id="popup" class="popup hidden">
    <div class="popup-content">
      <p id="popupMessage"></p>
      <div class="popup-actions">
        <button id="popupCancelBtn" type="button" class="btn btn-secondary hidden">No</button>
        <button id="popupConfirmBtn" type="button" class="btn btn-save hidden">Yes</button>
        <button id="popupOkBtn" type="button" class="btn btn-save" onclick="closePopup()">OK</button>
      </div>
    </div>
  </div> 

  <script src="script.js"></script>

</body>

</html>
