<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C240 - Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styling.css" />
</head>
<body>
  <header>
    <nav>
      <a href="home.html" class="brand">Beyond Four Walls</a>
      <div class="nav-links">
        <a href="home.html" class="active">Home</a>
        <a href="about.html">About Us</a>
        <a href="chat.html">Chat</a>

        <div class="profile-dropdown" id="profileDropdown">
          <button class="avatar-btn" id="avatarBtn" aria-label="Toggle user menu" aria-haspopup="true"
            aria-expanded="false">profile</button>
          <div class="dropdown-menu" id="dropdownMenu">
            <a href="profile.html" id="updateProfileOpt"><span class="icon">👤</span> Update Profile</a>
            <a href="#" id="logoutOpt" class="logout-link"><span class="icon">🚪</span> Logout</a>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <main class="chat-page">
    <div class="chat-glow" aria-hidden="true"></div>

    <section class="chat-hero">
      <p class="eyebrow">A quiet space to talk</p>
      <h1>Hi, I'm Lumi.</h1>
      <p class="subtext">Whatever's on your mind, we can take it at your pace.</p>
    </section>

    <section class="friends-section">
      <div class="friends-card">
        <div class="friends-header">
          <div>
            <h2>Suggested Friends</h2>
            <p class="friends-sub">Based on your interests</p>
          </div>
          <button class="find-btn" onclick="findFriends()">Find Friends</button>
        </div>
        <div id="matches" class="matches-grid"></div>
      </div>
    </section>

    <!-- Botpress mounts here instead of the default floating bubble -->
    <!-- <section class="chat-panel" id="chat-mount" aria-label="Chat conversation"></section> -->
  </main>

  <!-- Floating friend-to-friend chat window -->
  <div id="chatPanel" class="chat-float hidden" role="dialog" aria-label="Chat with friend">
    <div class="chat-box-header">
      <div class="chat-peer">
        <span id="chatAvatar" class="friend-avatar chat-avatar-sm"></span>
        <div>
          <h3 id="chatTitle"></h3>
          <p class="chat-status">Matched friend</p>
        </div>
      </div>
      <button class="chat-close" onclick="closeChat()" aria-label="Close chat">✕</button>
    </div>
    <div id="chatMessages" class="chat-messages"></div>
    <div id="sharedInterests" class="shared-interests hidden"></div>
    <div id="icebreakerHint" class="icebreaker-hint hidden"></div>
    <div class="chat-input-row">
      <button class="icebreaker-btn" onclick="getIcebreaker()" title="Ask Lumi for an icebreaker">✨</button>
      <input id="msgInput" type="text" placeholder="Type a message..." autocomplete="off"
            onkeydown="if(event.key==='Enter') sendMessage()" />
      <button class="say-hi-btn chat-send" onclick="sendMessage()" aria-label="Send">➤</button>
    </div>
  </div>

  <!-- Botpress Webchat -->
  <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
  <script src="https://files.bpcontent.cloud/2026/05/12/04/20260512040002-3M3JEC0F.js" defer></script>

  <div id="popup" class="popup hidden">
    <div class="popup-content">
      <p id="popupMessage"></p>
      <div class="popup-actions">
        <button id="popupCancelBtn" type="button" class="btn btn-secondary hidden">No</button>
        <button id="popupConfirmBtn" type="button" class="btn btn-save hidden">Yes</button>
        <button id="popupOkBtn" type="button" class="btn btn-save" onclick="closePopup()">OK</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
