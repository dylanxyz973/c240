<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styling.css" />
</head>
<body>
 <header>
  </header>

  <main class="content-card">
    <h1>Create Account</h1>
    <form id="signupForm" action="/signup" method="POST" novalidate>
      <input type="text" name="username" placeholder="Username" required />
      <input type="email" name="email" placeholder="Email" required />
      <input type="password" name="password" placeholder="Password" required />
      <input type="password" name="confirmPassword" placeholder="Confirm Password" required />
      <button type="submit">Sign Up</button>
    </form>
    <p id="signupError" role="alert" style="color:#b03030;min-height:1.25rem;"></p>
    <p><a href="login.html">Already have an account?</a></p>
  </main>

  <script src="api-config.js"></script>
  <script>
    (function () {
      const form = document.getElementById('signupForm');
      const errorEl = document.getElementById('signupError');

      if (!form) return;

      form.addEventListener('submit', async function (event) {
        event.preventDefault();

        const formData = new FormData(form);
        const username = String(formData.get('username') || '').trim();
        const email = String(formData.get('email') || '').trim().toLowerCase();
        const password = String(formData.get('password') || '');
        const confirmPassword = String(formData.get('confirmPassword') || '');

        if (errorEl) errorEl.textContent = '';

        try {
          const endpoint = typeof window.getApiUrl === 'function'
            ? window.getApiUrl('/signup')
            : '/signup';

          const body = new URLSearchParams({ username, email, password, confirmPassword }).toString();

          const response = await fetch(endpoint, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded'
            },
            body
          });

          const result = await response.json().catch(function () {
            return { success: false, message: 'Unexpected server response.' };
          });

          if (!response.ok || !result.success) {
            if (errorEl) {
              errorEl.textContent = result.message || 'Signup failed. Please try again.';
            }
            return;
          }

          localStorage.setItem('currentUser', username);
          localStorage.setItem('loggedInUser', username);
          localStorage.setItem('loggedInUserEmail', email);
          localStorage.setItem('loggedInUserPassword', password);
          localStorage.setItem('isLoggedIn', 'true');
          sessionStorage.setItem('loggedInUserEmail', email);

          window.location.href = 'home.html';
        } catch (error) {
          if (errorEl) {
            errorEl.textContent = 'Network error. Please make sure the backend is running.';
          }
        }
      });
    })();
  </script>
</body>
</html>
