<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styling.css" />
</head>
<body>
 <header>
  </header>

  <main class="content-card">
    <h1>Create Account</h1>
    <form id="signupForm" action="/signup" method="POST" novalidate>
      <input type="text" name="username" placeholder="Username" required />
      <input type="email" name="email" placeholder="Email" required />
      <input type="password" name="password" placeholder="Password" required />
      <input type="password" name="confirmPassword" placeholder="Confirm Password" required />
      <button type="submit">Sign Up</button>
    </form>
    <p id="signupError" role="alert" style="color:#b03030;min-height:1.25rem;"></p>
    <p><a href="login.html">Already have an account?</a></p>
  </main>

  <script src="api-config.js?v=2"></script>
  <script>
    (function () {
      const form = document.getElementById('signupForm');
      const errorEl = document.getElementById('signupError');
      const CLIENT_USERS_KEY = 'c240ClientUsers';

      function clearClientAuthState() {
        const authKeys = [
          'currentUser',
          'loggedInUser',
          'loggedInUserEmail',
          'loggedInUserPassword',
          'isLoggedIn'
        ];

        authKeys.forEach(function (key) {
          localStorage.removeItem(key);
          sessionStorage.removeItem(key);
        });

        localStorage.removeItem('userProfile');
      }

      function loadClientUsers() {
        try {
          const raw = localStorage.getItem(CLIENT_USERS_KEY);
          const parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch (error) {
          return [];
        }
      }

      function saveClientUsers(users) {
        localStorage.setItem(CLIENT_USERS_KEY, JSON.stringify(users));
      }

      function saveLoggedInState(username, email, password) {
        const normalizedEmail = String(email || '').trim().toLowerCase();
        const resolvedUsername = String(username || normalizedEmail.split('@')[0] || '').trim();

        localStorage.setItem('currentUser', resolvedUsername);
        localStorage.setItem('loggedInUser', resolvedUsername);
        localStorage.setItem('loggedInUserEmail', normalizedEmail);
        localStorage.setItem('loggedInUserPassword', password);
        localStorage.setItem('isLoggedIn', 'true');
        sessionStorage.setItem('currentUser', resolvedUsername);
        sessionStorage.setItem('loggedInUser', resolvedUsername);
        sessionStorage.setItem('loggedInUserEmail', normalizedEmail);
        sessionStorage.setItem('isLoggedIn', 'true');
      }

      function signupWithClientStorage(username, email, password, confirmPassword) {
        if (!username || !email || !password || !confirmPassword) {
          if (errorEl) {
            errorEl.textContent = 'Please fill in all fields.';
          }
          return;
        }

        if (password !== confirmPassword) {
          if (errorEl) {
            errorEl.textContent = 'Passwords do not match.';
          }
          return;
        }

        const normalizedEmail = String(email || '').trim().toLowerCase();
        const users = loadClientUsers();
        const existing = users.find(function (user) {
          return String(user.email || '').trim().toLowerCase() === normalizedEmail;
        });

        if (existing) {
          if (errorEl) {
            errorEl.textContent = 'Email already exists.';
          }
          return;
        }

        users.push({
          username: String(username).trim(),
          email: normalizedEmail,
          password: String(password)
        });

        saveClientUsers(users);
        clearClientAuthState();
        saveLoggedInState(username, normalizedEmail, password);
        window.location.replace('home.html');
      }

      function isJsonResponse(response) {
        const contentType = String(response && response.headers && response.headers.get('content-type') || '').toLowerCase();
        return contentType.includes('application/json');
      }

      if (!form) return;

      form.addEventListener('submit', async function (event) {
        event.preventDefault();

        const formData = new FormData(form);
        const username = String(formData.get('username') || '').trim();
        const email = String(formData.get('email') || '').trim().toLowerCase();
        const password = String(formData.get('password') || '');
        const confirmPassword = String(formData.get('confirmPassword') || '');

        if (errorEl) errorEl.textContent = '';

        try {
          const endpoint = typeof window.getApiUrl === 'function'
            ? window.getApiUrl('/signup')
            : '/signup';

          if (!endpoint) {
            signupWithClientStorage(username, email, password, confirmPassword);
            return;
          }

          const body = new URLSearchParams({ username, email, password, confirmPassword }).toString();

          const response = await fetch(endpoint, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded'
            },
            body
          });

          if (!isJsonResponse(response)) {
            signupWithClientStorage(username, email, password, confirmPassword);
            return;
          }

          const result = await response.json().catch(function () {
            return null;
          });

          if (!result) {
            signupWithClientStorage(username, email, password, confirmPassword);
            return;
          }

          if (!response.ok || !result.success) {
            if (errorEl) {
              errorEl.textContent = result.message || 'Signup failed. Please try again.';
            }
            if (!response.ok) {
              signupWithClientStorage(username, email, password, confirmPassword);
            }
            return;
          }

          const normalizedEmail = String(result.email || email).trim().toLowerCase();
          const resolvedUsername = String(result.username || username || normalizedEmail.split('@')[0] || '').trim();

          clearClientAuthState();
          saveLoggedInState(resolvedUsername, normalizedEmail, password);

          window.location.replace('home.html');
        } catch (error) {
          signupWithClientStorage(username, email, password, confirmPassword);
        }
      });
    })();
  </script>
</body>
</html>
