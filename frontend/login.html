<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styling.css" />
</head>
<body>
  <header>
  </header>

  <main class="content-card">
    <h1>Login</h1>
    <form id="loginForm" action="/login" method="POST" novalidate>
      <input type="email" name="email" placeholder="Email" required />
      <input type="password" name="password" placeholder="Password" required />
      <button type="submit">Log In</button>
    </form>
    <p id="loginError" role="alert" style="color:#b03030;min-height:1.25rem;"></p>
    <p><a href="signup.html?v=20260708">Create an account</a></p>
  </main>

  <script src="api-config.js?v=2"></script>
  <script>
    (function () {
      const form = document.getElementById('loginForm');
      const errorEl = document.getElementById('loginError');
      const CLIENT_USERS_KEY = 'c240ClientUsers';

      function loadClientUsers() {
        try {
          const raw = localStorage.getItem(CLIENT_USERS_KEY);
          const parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch (error) {
          return [];
        }
      }

      function saveLoggedInState(username, email, password) {
        const normalizedEmail = String(email || '').trim().toLowerCase();
        const resolvedUsername = String(username || normalizedEmail.split('@')[0] || '').trim();

        localStorage.setItem('currentUser', resolvedUsername);
        localStorage.setItem('loggedInUser', resolvedUsername);
        localStorage.setItem('loggedInUserEmail', normalizedEmail);
        localStorage.setItem('loggedInUserPassword', password);
        localStorage.setItem('isLoggedIn', 'true');
        sessionStorage.setItem('currentUser', resolvedUsername);
        sessionStorage.setItem('loggedInUser', resolvedUsername);
        sessionStorage.setItem('loggedInUserEmail', normalizedEmail);
        sessionStorage.setItem('isLoggedIn', 'true');
      }

      function loginWithClientStorage(email, password) {
        const normalizedEmail = String(email || '').trim().toLowerCase();
        const users = loadClientUsers();
        const matchedUser = users.find(function (user) {
          return String(user.email || '').trim().toLowerCase() === normalizedEmail;
        });

        if (!matchedUser) {
          if (errorEl) {
            errorEl.textContent = 'No local account was found for that email.';
          }
          return;
        }

        if (String(matchedUser.password || '') !== String(password || '')) {
          if (errorEl) {
            errorEl.textContent = 'Email or password is incorrect.';
          }
          return;
        }

        saveLoggedInState(matchedUser.username, matchedUser.email, password);
        window.location.href = 'home.html';
      }

      function isJsonResponse(response) {
        const contentType = String(response && response.headers && response.headers.get('content-type') || '').toLowerCase();
        return contentType.includes('application/json');
      }

      if (!form) return;

      form.addEventListener('submit', async function (event) {
        event.preventDefault();

        const formData = new FormData(form);
        const email = String(formData.get('email') || '').trim();
        const password = String(formData.get('password') || '');

        if (errorEl) errorEl.textContent = '';

        try {
          const endpoint = typeof window.getApiUrl === 'function'
            ? window.getApiUrl('/login')
            : '/login';

          if (!endpoint) {
            loginWithClientStorage(email, password);
            return;
          }

          const body = new URLSearchParams({ email, password }).toString();

          const response = await fetch(endpoint, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded'
            },
            body
          });

          if (!isJsonResponse(response)) {
            loginWithClientStorage(email, password);
            return;
          }

          const result = await response.json().catch(function () {
            return null;
          });

          if (!result) {
            loginWithClientStorage(email, password);
            return;
          }

          if (!response.ok || !result.success) {
            if (errorEl) {
              errorEl.textContent = result.message || 'Login failed. Please try again.';
            }

            if (!response.ok) {
              loginWithClientStorage(email, password);
            }
            return;
          }

          saveLoggedInState(result.username, email, password);

          window.location.href = 'home.html';
        } catch (error) {
          loginWithClientStorage(email, password);
        }
      });
    })();
  </script>
</body>
</html>
