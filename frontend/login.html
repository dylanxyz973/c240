<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallbreak Lumi - Login</title>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Link to external stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <!-- Left Side: Login Form -->
    <div class="left-panel">
      
      <!-- Logo Container holding the white banner image -->
      <div class="logo-container">
        <img src="pics/icon.png" alt="Wallbreak Lumi Logo" class="logo-banner-img">
      </div>

      <h1 class="welcome-text">Welcome Back !</h1>

      <p class="subtitle">
        Sign in to connect with people worldwide or<br>
        practice conversations with Lumi — all in one place.
      </p>

      <div class="form-card">
        <form>
          <div class="input-group">
            <label>Email</label>
            <input type="text" placeholder="Petertan@user123">
          </div>

          <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="user@user123">
          </div>

          <button type="button" class="login-btn">Log in</button>

          <div class="forgot-container">
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>
        </form>
      </div>

      <div class="signup-container">
        Dont have an account? <a href="#">Sign up</a>
      </div>
    </div>

    <!-- Right Side: Illustrations Stack -->
    <div class="right-panel">
      <div class="img-placeholder img-1" style="background-image: url('pics/image1.png');"></div>
      <div class="img-placeholder img-2" style="background-image: url('pics/image2.png');"></div>
      <div class="img-placeholder img-3" style="background-image: url('pics/image3.png');"></div>
    </div>
    
  </div>

</body>
</html>
